services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      immudb:
        condition: service_started
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  immudb:
    image: codenotary/immudb:latest
    ports:
      - "3322:3322"
      - "9497:9497"
    volumes:
      - immudb_data:/var/lib/immudb
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password123
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  immudb_data:
  neo4j_data:
